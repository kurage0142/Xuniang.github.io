<body>
<div class="container">
    <div class="top-bar">
        <div><div style="display: flex; align-items: baseline; flex-wrap: wrap;"><h1 class="main-title">戌娘</h1><div class="seal"><div class="stamp"><div class="stamp-inner">债</div></div></div><div class="subtitle">童子债 · 守祠人</div></div></div>
        <button class="btn-fate" id="openFateBtn"><i class="fas fa-yin-yang"></i> 批命簿</button>
    </div>
    <div class="obsession-area">
        <div class="obsession-buttons"><div class="obsession-btn" data-obsession="等"><div class="chinese">等</div><div class="sub">戌娘 · 债身</div></div><div class="obsession-btn" data-obsession="愧"><div class="chinese">愧</div><div class="sub">吴庭玉 · 债源</div></div><div class="obsession-btn" data-obsession="守"><div class="chinese">守</div><div class="sub">郑伯贤 · 债引</div></div></div>
        <div class="obsession-fragment" id="obsessionFragment"></div>
        <div class="if-collect-area"><div class="if-collect-title"><i class="fas fa-feather-alt"></i> 「若」· 铭刻</div><div id="ifList" style="font-size:13px; color:#a39282;">暂无铭刻，于分支中“铭记此刻”收藏若言</div></div>
    </div>
    <div class="view-tabs"><button class="tab-btn active" data-view="timeline"><i class="fas fa-timeline"></i> 纪年轴</button><button class="tab-btn" data-view="story"><i class="fas fa-book-open"></i> 业缘簿</button></div>
    <div id="timelineView" class="timeline-view"></div>
    <div id="storyView" class="story-view" style="display:none;"></div>
</div>
<div id="modalFate" class="modal-mask"><div class="modal-card"><h3 style="border-left:4px solid #b85c3a; padding-left:12px; color:#dbbc9e;">戌娘 · 命簿</h3><div style="margin:16px 0; font-size:13px;"><table style="width:100%; border-collapse:collapse; color:#cdbcab;"><tr><th>年柱</th><td>癸未</td><th>十神</th><td>正财</td><th>藏干</th><td>己丁乙</tr><tr><th>月柱</th><td>己未</td><th>十神</th><td>劫财</td><th>藏干</th><td>己丁乙</tr><tr><th>日柱</th><td>戊戌</td><th>十神</th><td>比肩</td><th>藏干</th><td>戊辛丁</tr><tr><th>时柱</th><td>丙辰</td><th>十神</th><td>偏印</td><th>藏干</th><td>戊乙癸</tr></table></div><p style="font-size:12px;">四柱皆土，日主戊土坐戌，土旺到极处。三岁丧母，替身入祠。债字拆开，是人担责。</p><button id="closeModalBtn" style="margin-top:16px; background:#b85c3a; border:none; padding:6px 16px; border-radius:40px; cursor:pointer;">掩卷</button></div></div>

<script>
    // ===================== 时间轴数据 =====================
    const timelineData = [
        { year: "咸丰七年 (1857)", title: "戌娘出生", desc: "八字癸未 己未 戊戌 丙辰，土重火炎。", details: "那日大雪，产婆说女娃不哭。父亲抱着她，像抱一捆柴。三岁丧母，五岁成多余之人。", detailOptions: ["陈家女儿", "八字命理", "村口碑"] },
        { year: "同治三年 (1864)", title: "替身咒·入祠堂", desc: "法师以戌娘为替身，承童子煞。", details: "父亲接过吴家银子。她在灶房门口坐了一夜。老妇人递给她铜钥匙：「等到人，就给他。」", detailOptions: ["法师的阴谋", "地基下的镇压", "梳溪谣"] },
        { year: "同治六年 (1867)", title: "冬至·隔窗念经", desc: "吴公子首次隔窗念《华严经》。", details: "「我每年冬至都给你念经。你听着。」她开始数日子。", detailOptions: ["隔窗念经", "第一次开口", "棉袄"] },
        { year: "同治十二年 (1873)", title: "通名·咒法失控", desc: "吴庭玉告知真名，因果逆转。", details: "「我叫吴庭玉。」那三个字钉进她的耳朵。她应了一声「嗯」。", branches: ["ruo_tai_tou"], detailOptions: ["通名之夜", "因果逆转", "那年冬至的雪"] },
        { year: "光绪元年 (1875)", title: "登船·南洋", desc: "吴庭玉登船去南洋，再未回头。", details: "他写了信：「我去南洋了，会找办法解咒。你等我。」船帆消失在海平线。", branches: ["ruo_nian_xin","ruo_wei_zou"], detailOptions: ["最后一封信", "登船", "南洋的希望"] },
        { year: "光绪三年 (1877)", title: "最后一面", desc: "吴母最后一次来祠堂，告知公子去了南洋。", details: "「不会回来了。」她攥着信，纸都烂了。", detailOptions: ["吴母的沉默", "那颗糖", "不会回来了"] },
        { year: "光绪九年 (1883)", title: "戌娘之死", desc: "死于神龛下，魂魄守祠。", details: "她闭上眼睛时，窗外没有人念经。手里攥着铜钥匙和银镯子。", branches: ["ruo_hao","ruo_bu_ru"], detailOptions: ["最后的八年", "头发变白", "哼出调子", "死在神龛下"] },
        { year: "民国九年 (1920)", title: "老华侨的信", desc: "郑伯贤替吴公子送信到空祠堂。", details: "他把信放在神龛上，蹲下来描了牌位上的字。「信到了。你是个有福的。还有人惦记你呢。」", detailOptions: ["槟城接信", "郑伯贤送信", "信到了"] },
        { year: "民国十五年 (1926)", title: "汕头茶楼", desc: "吴庭玉听到云韶唱那段无词小调。", details: "他浑身僵住，掏银票请她录唱片——「戌娘。戌时的戌。」她答应了，却录不成。", detailOptions: ["茶楼相遇", "嘱托录唱片", "调子的共振"] },
        { year: "业消·因果未断", title: "因果链", desc: "债字拆开，是人担责。", details: "戌娘是债身，吴庭玉是债源，云韶是债声，郑伯贤是债引。每个人都是一枚钉子——有人被钉，有人是钉。调子顺着货郎流进云韶的嗓子里，流了一百年。", detailOptions: ["法师的阴谋终局", "调子的真正源头", "四人钉"] },
        { year: "残香录", title: "后来", desc: "百年后的访客推开祠堂门。", details: "「门没锁。但进来的人出不去。」灰蓝色的影子还在擦牌位。", detailOptions: ["风中的问话", "未送到的信"] }
    ];

    // ===================== 细看前尘详细叙事库 =====================
    const detailLibrary = {
        "陈家女儿": { icon: "fa-baby", sentences: ["小戌村陈家，咸丰七年冬。", "接生婆说：这孩子八字重。", "母亲叫她戌娘。无人问过大名。", "三岁丧母，继母进门。", "睡灶房柴堆，吃得最少，干得最多。", "五岁蹲在村口榕树下，看男童去私塾。", "她不识字，但记住了‘路’的形状。", "路的那头，她后来再也没去过。"] },
        "八字命理": { icon: "fa-chart-line", sentences: ["八字：癸未 己未 戊戌 丙辰。", "四柱皆土，日主戊土坐戌。", "土旺到极处，克亲克己。", "命理说，这样的孩子是‘空容器’。", "法师后来找替身，方圆三十里只她符合。", "她的命，从一开始就被选中了。", "容器没有选择，只有被装进去的命。"] },
        "村口碑": { icon: "fa-mountain", sentences: ["村口有一块碑，刻着村名。", "戌娘不识字，但每次路过都看。", "她记住那个形状——太密，像荆棘。", "后来她擦牌位，手指认得每个笔画。", "她不识字，但她的手指替她记住了。", "她的手指记住了，可她的心忘了。"] },
        "法师的阴谋": { icon: "fa-mask", sentences: ["法师来自隐秘流派，专修‘替死换生’。", "童子煞是纯粹业力，可被剥离、封存。", "戌娘被做成‘空容器’——无自我，只剩执念。", "她的死不是意外，是设计。", "法师需要她死，死前磨到只剩‘等’。", "工具而已。他后来再没来取用。", "但‘等’已经钉在她魂魄里，拔不掉了。"] },
        "地基下的镇压": { icon: "fa-layer-group", sentences: ["祠堂地基下埋了三样东西。", "吴公子八字的铜牌。", "戌娘八字的石板。", "兑卦符咒的石盘。", "三层镇压，把童子煞从公子身上剥离。", "通过兑位的缺口，导入戌娘的命格里。", "她是他的替身。她不知道。", "石板压着她，她压着石板下的咒。"] },
        "梳溪谣": { icon: "fa-music", sentences: ["守祠老妇人教她唱梳溪谣。", "一梳长命，二梳无忧。", "三梳——老妇人不教了。", "‘唱了，就回不来了。’", "戌娘记住了空白。", "后来她哼的调子，不是这首。", "空白的那一句，她等了一辈子也没等到。"] },
        "隔窗念经": { icon: "fa-book", sentences: ["公子不敢进祠堂，绕到后窗。", "窗户纸破了一个洞。", "他趴在那里念《华严经》。", "念完了问：‘你听到了吗？’", "沉默很久，传来一个‘嗯’。", "他高兴了一整年。", "她不知道那部经的意思，但记住了他的声音。", "那个声音后来陪了她很多年。"] },
        "第一次开口": { icon: "fa-comment", sentences: ["第二年冬至，他又来了。", "‘我又来了。’", "‘嗯。’", "‘你记得我？’", "‘记得。’", "他笑了。她在窗户纸那边也笑了。", "那是她第一次承认记得一个人。", "后来她记了一辈子。"] },

    // DOM 操作与渲染（与之前相同，确保所有分支正常）
    const timelineContainer = document.getElementById("timelineView");
    const storyContainer = document.getElementById("storyView");
    const tabs = document.querySelectorAll(".tab-btn");

    const obsessionFragmentDiv = document.getElementById("obsessionFragment");

    let activeObsession = "等";
    let typingTimer = null;
    let collectedIfs = [];

    function typeWriter(element, text, speed = 45) { if (typingTimer) clearTimeout(typingTimer); element.innerHTML = ""; let i = 0; function type() { if (i < text.length) { element.innerHTML += text.charAt(i); i++; typingTimer = setTimeout(type, speed); } else typingTimer = null; } type(); }
    function updateObsessionFragment() { let txt = obsessionTexts[activeObsession] || obsessionTexts.等; typeWriter(obsessionFragmentDiv, txt, 40); }
    obsessionBtns.forEach(btn => { btn.addEventListener("click", () => { obsessionBtns.forEach(b => b.classList.remove("active")); btn.classList.add("active"); activeObsession = btn.getAttribute("data-obsession"); updateObsessionFragment(); }); });
    function addIfCollect(branchId, fullText) { const branch = branchLibrary[branchId]; if (!branch) return; const title = branch.name; const short = fullText.length > 70 ? fullText.substring(0, 70) + "…" : fullText; if (!collectedIfs.some(item => item.title === title)) { collectedIfs.unshift({ title, summary: short }); renderIfCollectArea(); } }
    function renderIfCollectArea() { if (collectedIfs.length === 0) { ifListDiv.innerHTML = "暂无铭刻，于分支中“铭记此刻”收藏若言"; return; } ifListDiv.innerHTML = collectedIfs.map(item => `<div style="margin-bottom:10px; border-left:2px solid #b85c3a; padding-left:10px; font-size:12px;"><strong>「若」· ${item.title}</strong><br>${item.summary}</div>`).join(''); }

    function showProgressive(sentences, container, onBack, mode = 'detail', branchId = null) {
        let currentIndex = 0;
        function renderStep() {
            const shown = sentences.slice(0, currentIndex + 1);
            let html = `<div class="progressive-text">`;
            shown.forEach(s => { html += `<div class="progressive-sentence">${s}</div>`; });
            html += `</div>`;
            if (currentIndex + 1 < sentences.length) {
                html += `<button class="step-btn" id="nextStepBtn"><i class="fas fa-arrow-right"></i> 拾阶而上</button>`;
            } else {
                if (mode === 'branch' && branchId) {
                    const fullText = sentences.join(" ");
                    html += `<button class="remember-btn" id="rememberThisBtn" data-bid="${branchId}"><i class="fas fa-bookmark"></i> 铭记此刻</button>`;
                }
                html += `<div style="text-align:center; margin-top:12px;"><i class="fas fa-circle" style="font-size:6px; color:#b85c3a;"></i>  因果已明  <i class="fas fa-circle" style="font-size:6px; color:#b85c3a;"></i></div>`;
                html += `<button class="step-btn" id="backToListFromProgressive" style="background:#2a231e;"><i class="fas fa-undo-alt"></i> 忘却</button>`;
            }
            container.innerHTML = html;
            if (document.getElementById("nextStepBtn")) document.getElementById("nextStepBtn").addEventListener("click", () => { currentIndex++; renderStep(); });
            if (document.getElementById("rememberThisBtn")) {
                document.getElementById("rememberThisBtn").addEventListener("click", (e) => {
                    const bid = e.currentTarget.getAttribute("data-bid");
                    const fullText = sentences.join(" ");
                    addIfCollect(bid, fullText);
                });
            }
            document.getElementById("backToListFromProgressive")?.addEventListener("click", () => { if (onBack) onBack(); });
        }
        renderStep();
    }

    function renderDetailPanel(node, panelContainer) {
        const options = node.detailOptions || [];
        if (options.length === 0) { panelContainer.innerHTML = `<div style="padding:1rem;">此节点无更多尘封手记。</div>`; return; }
        function showList() {
            let html = `<div class="detail-breadcrumb"><span><i class="fas fa-scroll"></i> 尘封手记</span><button class="small-btn closeDetailBtn" style="background:none;">忘却</button></div><div class="option-list">`;
            options.forEach(opt => { const lib = detailLibrary[opt]; if(lib) html += `<div class="option-card" data-opt="${opt}"><i class="fas ${lib.icon}"></i><div><strong>${opt}</strong><div style="font-size:12px;">展卷细读</div></div></div>`; });
            html += `</div>`;
            panelContainer.innerHTML = html;
            panelContainer.querySelectorAll(".option-card").forEach(card => { card.addEventListener("click", (e) => { const opt = card.getAttribute("data-opt"); const sentences = detailLibrary[opt]?.sentences; if(sentences) showProgressive(sentences, panelContainer, () => showList(), 'detail'); }); });
            panelContainer.querySelector(".closeDetailBtn").addEventListener("click", () => { panelContainer.style.display = "none"; const detailBtn = document.querySelector(`.detail-toggle[data-idx="${node._idx}"]`); if(detailBtn) detailBtn.innerHTML = '<i class="fas fa-scroll"></i> 回看前尘'; });
        }
        showList();
    }

    function renderBranchPanel(idx, panelContainer) {
        const node = timelineData[idx];
        const branchIds = node.branches || [];
        if (branchIds.length === 0) { panelContainer.innerHTML = `<div style="padding:1rem;">此节点无岔路，惟命定之途。</div>`; return; }
        function showList() {
            let html = `<div class="branch-breadcrumb"><span><i class="fas fa-tree"></i> 若·岔口</span><button class="small-btn closeBranchBtn" style="background:none;">忘却</button></div><div class="option-list">`;
            branchIds.forEach(bid => { const b = branchLibrary[bid]; if(b) html += `<div class="option-card" data-bid="${bid}"><i class="fas ${b.icon}"></i><div><strong>${b.name}</strong><div style="font-size:12px;">循此探因</div></div></div>`; });
            html += `</div>`;
            panelContainer.innerHTML = html;
            panelContainer.querySelectorAll(".option-card").forEach(card => { card.addEventListener("click", (e) => { const bid = card.getAttribute("data-bid"); const sentences = branchLibrary[bid]?.sentences; if(sentences) showProgressive(sentences, panelContainer, () => showList(), 'branch', bid); }); });
            panelContainer.querySelector(".closeBranchBtn").addEventListener("click", () => { panelContainer.style.display = "none"; const toggleBtn = document.querySelector(`.branch-toggle[data-idx="${idx}"]`); if(toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-shoe-prints"></i> 循迹而往'; });
        }
        showList();
    }

    function renderTimeline() {
        timelineContainer.innerHTML = "";
        let separatorInserted = false;
        timelineData.forEach((item, idx) => {
            if (!separatorInserted && item.year === "光绪九年 (1883)") {
                const itemDiv = createTimelineItem(item, idx);
                timelineContainer.appendChild(itemDiv);
                const sep = document.createElement("div");
                sep.className = "timeline-separator";
                sep.innerHTML = '<i class="fas fa-skull"></i> 魂归 · 因果未散 <i class="fas fa-skull"></i>';
                timelineContainer.appendChild(sep);
                separatorInserted = true;
                return;
            }
            const itemDiv = createTimelineItem(item, idx);
            timelineContainer.appendChild(itemDiv);
        });
        attachEvents();
    }

    function createTimelineItem(item, idx) {
        item._idx = idx;
        const itemDiv = document.createElement("div"); itemDiv.className = "timeline-item";
        const lineStyle = idx === timelineData.length-1 ? 'display:none' : '';
        itemDiv.innerHTML = `<div class="timeline-line" style="${lineStyle}"></div><div class="timeline-dot"></div><div class="year-badge">${item.year}</div><div class="event-card"><div class="event-title">${item.title}</div><div class="event-desc">${item.desc}</div><div class="action-buttons"><button class="small-btn detail-toggle" data-idx="${idx}"><i class="fas fa-scroll"></i> 回看前尘</button><button class="small-btn branch-toggle" data-idx="${idx}"><i class="fas fa-shoe-prints"></i> 循迹而往</button></div><div class="detail-panel" id="detailPanel-${idx}" style="display:none;"></div><div class="branch-panel" id="branchPanel-${idx}" style="display:none;"></div></div>`;
        return itemDiv;
    }

    function attachEvents() {
        document.querySelectorAll(".detail-toggle").forEach(btn => { btn.addEventListener("click", (e) => { const idx = parseInt(btn.getAttribute("data-idx")); const panel = document.getElementById(`detailPanel-${idx}`); const isOpen = panel.style.display === "block"; if(isOpen) { panel.style.display = "none"; btn.innerHTML = '<i class="fas fa-scroll"></i> 回看前尘'; } else { document.querySelectorAll('.detail-panel').forEach(p => p.style.display = 'none'); document.querySelectorAll('.detail-toggle').forEach(b => b.innerHTML = '<i class="fas fa-scroll"></i> 回看前尘'); panel.style.display = "block"; btn.innerHTML = '<i class="fas fa-door-closed"></i> 掩卷'; renderDetailPanel(timelineData[idx], panel); } }); });
        document.querySelectorAll(".branch-toggle").forEach(btn => { btn.addEventListener("click", (e) => { const idx = parseInt(btn.getAttribute("data-idx")); const panel = document.getElementById(`branchPanel-${idx}`); const isOpen = panel.style.display === "block"; if(isOpen) { panel.style.display = "none"; btn.innerHTML = '<i class="fas fa-shoe-prints"></i> 循迹而往'; } else { document.querySelectorAll('.branch-panel').forEach(p => p.style.display = 'none'); document.querySelectorAll('.branch-toggle').forEach(b => b.innerHTML = '<i class="fas fa-shoe-prints"></i> 循迹而往'); panel.style.display = "block"; btn.innerHTML = '<i class="fas fa-door-closed"></i> 敛息'; renderBranchPanel(idx, panel); } }); });
    }

    const storyCards = [
        { name: "戌娘 · 等", bazi: "癸未 己未 戊戌 丙辰 · 债身", icon: "fa-hourglass-half", quote: "「门没锁。但进来的人出不去。」", period: "咸丰七年 → 光绪九年", conclusion: "她是业力，是工具，是一句问了一辈子也没人回答的话。被钉者。" },
        { name: "吴庭玉 · 愧", bazi: "童子煞 · 真童子", icon: "fa-ship", quote: "「我每年冬至都给你念经。你听着。」", period: "同治三年 → 民国十九年", conclusion: "他的思念是锁，勒了她四十年。他的名字是钥匙，被他扔进了海里。钉本身。" },
        { name: "云韶 · 困", bazi: "庚子 戊午 庚子 戊寅 · 偏印三重", icon: "fa-music", quote: "「我不是长平公主。」", period: "光绪二十六年 → 民国三十二年", conclusion: "她是一口井，井底住了很多人。她分不清哪个是自己。被钉住的喉。" },
        { name: "郑伯贤 · 守", bazi: "偏印三重 · 水客", icon: "fa-envelope-open-text", quote: "「信到了。你是个有福的。」", period: "光绪十四年 → 民国三十八年", conclusion: "他想等一封给自己的信，却成了缚紧别人锁链的手。钉下祝福的人。" }
    ];
    function renderStory() {
        storyContainer.innerHTML = `<div class="cards-grid">${storyCards.map(card => `<div class="char-card"><h3><i class="fas ${card.icon}"></i> ${card.name}</h3><div style="font-size:12px; color:#b47b56;">${card.bazi}</div><div style="margin:12px 0; font-style:italic; color:#dbbc9e;">${card.quote}</div><div>${card.period}</div><div style="margin-top:12px; border-top:1px dashed #7d6b4b; padding-top:8px; font-size:13px;">${card.conclusion}</div></div>`).join('')}</div><div class="summary"><i class="fas fa-circle" style="font-size:6px;"></i>  债字拆开，是人担责。每个人都是一枚钉子——有人被钉，有人是钉。  <i class="fas fa-circle" style="font-size:6px;"></i></div>`;
    }
    function switchView(view) { const tv = document.getElementById("timelineView"), sv = document.getElementById("storyView"); if(view === 'timeline') { tv.style.display = 'block'; sv.style.display = 'none'; } else { tv.style.display = 'none'; sv.style.display = 'block'; if(storyContainer.innerHTML === '') renderStory(); } }
    tabs.forEach(tab => { tab.addEventListener('click', () => { tabs.forEach(t=>t.classList.remove('active')); tab.classList.add('active'); switchView(tab.getAttribute('data-view')); }); });
    const modal = document.getElementById('modalFate'); document.getElementById('openFateBtn').addEventListener('click', () => modal.classList.add('active')); document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.remove('active')); modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('active'); });
    renderTimeline(); updateObsessionFragment(); document.querySelector('.obsession-btn[data-obsession="等"]').classList.add('active');
</script>
</body>
</html>
